    <h1>Create Product</h1>


    <div class="container-login">
        <div class="form-group">
            <div class="input-login">
                <label for="name"><b>Name</b></label>
                <input type="text" placeholder="Enter Name" name="name" id="name" required>
            </div>
    
            <div class="input-login">
                <label for="description"><b>description</b></label>
                <textarea placeholder="Enter description" class="text-area" height="100px" name="description" id="description"></textarea>
            </div>
            
            <div class="input-login">
                <label for="price"><b>price</b></label>
                <input type="number" placeholder="Enter price" name="price" id="price"></input>
            </div>

            <div class="input-login">
                <label for="Stock"><b>Stock</b></label>
                <input type="number" placeholder="Enter Stock" name="Stock" id="stock"></input>
            </div>

            <div class="input-login">
                <label for="image"><b>Image</b></label>
                <input type="file" name="image" id="image"></input>
            </div>
    
            <button type="submit" class="create btn-save">Create</button>
        </div>
    </div>

    
    <!-- jQuery -->
      <script src="js/jquery-3.7.1.min.js"></script>
